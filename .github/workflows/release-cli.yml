name: Release CLI

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    name: Publish npm CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: packages/cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Verify CLI version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${GITHUB_REF_NAME#v}"
          if [[ "${PACKAGE_VERSION}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match packages/cli/package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Run CLI tests
        run: pnpm test

      - name: Build CLI
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public
